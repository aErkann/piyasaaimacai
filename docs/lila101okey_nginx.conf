# lila101okey.win — Admin + API
server {
    listen 80;
    server_name lila101okey.win www.lila101okey.win;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lila101okey.win www.lila101okey.win;

    ssl_certificate     /etc/letsencrypt/live/lila101okey.win/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lila101okey.win/privkey.pem;

    # Admin panel
    location /admin/ {
        proxy_pass http://127.0.0.1:3000/admin/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # API
    location /api/ {
        rewrite ^/api/(.*) /$1 break;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }

    # Root redirect to admin
    location / {
        return 301 /admin/;
    }
}
